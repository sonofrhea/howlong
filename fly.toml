# fly.toml app configuration file generated for urusentra-frontend on 2025-12-31T00:53:44+08:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'urusentra-frontend'
primary_region = 'sin'

[build]
  image = "pierrezemb/gostatic"

[env]
  NODE_ENV = "production"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '512mb'
  cpus = 1
  memory_mb = 512
