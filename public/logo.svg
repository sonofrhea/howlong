<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E63946;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#F77F6D;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#D95D5F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A8474F;stop-opacity:1" />
    </linearGradient>
    
    <clipPath id="circleClip">
      <circle cx="200" cy="200" r="178"/>
    </clipPath>
  </defs>
  
  <!-- Main content clipped to circle -->
  <g clip-path="url(#circleClip)">
    <!-- Sky background -->
    <circle cx="200" cy="200" r="178" fill="url(#skyGradient)"/>
    
    <!-- Sun with glow -->
    <circle cx="200" cy="230" r="32" fill="#FFFFFF" opacity="0.98"/>
    
    <!-- Distant mountains - very soft red tones -->
    <path d="M 20 245 L 80 195 L 130 215 L 170 185 L 210 200 L 250 175 L 290 195 L 340 210 L 380 245 Z" 
          fill="#D95D5F" opacity="0.5"/>
    
    <path d="M 20 260 L 70 220 L 120 240 L 165 210 L 215 230 L 265 205 L 310 225 L 380 265 Z" 
          fill="#C85656" opacity="0.6"/>
    
    <path d="M 20 280 L 90 240 L 140 260 L 190 230 L 240 255 L 290 225 L 340 250 L 380 285 Z" 
          fill="#B04E4E" opacity="0.7"/>
    
    <!-- Transition to gray mountains -->
    <path d="M 20 305 L 75 270 L 130 290 L 180 260 L 230 285 L 280 255 L 330 280 L 380 310 Z" 
          fill="#8A5555" opacity="0.8"/>
    
    <path d="M 20 330 L 85 295 L 145 315 L 200 285 L 255 310 L 310 290 L 380 335 Z" 
          fill="#5A5A5A" opacity="0.85"/>
    
    <!-- Foreground dark mountains -->
    <path d="M 20 355 L 95 315 L 160 340 L 220 310 L 280 335 L 345 320 L 380 355 Z" 
          fill="#3A3A3A"/>
    
    <!-- Dark base -->
    <ellipse cx="200" cy="370" rx="178" ry="45" fill="#2A2A2A"/>
    <ellipse cx="200" cy="375" rx="178" ry="35" fill="#1A1A1A"/>
  </g>
  

</svg>